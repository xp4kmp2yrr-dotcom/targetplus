kind = "mobile"
previewPath = "/"
title = "Target+"
version = "1.0.0"
id = "artifacts/target-plus"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22312

[services.development]
run = "pnpm --filter @workspace/target-plus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/target-plus", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/target-plus", "run", "serve" ]

[services.env]
PORT = "22312"
BASE_PATH = "/"
